<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f5f3ff"/>

  <!-- subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ede9fe" stroke-width="1"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- center circle background -->
  <circle cx="300" cy="185" r="64" fill="#ede9fe"/>

  <!-- calendar icon -->
  <rect x="268" y="158" width="64" height="56" rx="8" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <line x1="268" y1="174" x2="332" y2="174" stroke="#7c3aed" stroke-width="3"/>
  <line x1="284" y1="150" x2="284" y2="166" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="150" x2="316" y2="166" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <rect x="281" y="183" width="10" height="10" rx="2" fill="#7c3aed"/>
  <rect x="295" y="183" width="10" height="10" rx="2" fill="#7c3aed"/>
  <rect x="309" y="183" width="10" height="10" rx="2" fill="#c4b5fd"/>
  <rect x="281" y="197" width="10" height="10" rx="2" fill="#c4b5fd"/>
  <rect x="295" y="197" width="10" height="10" rx="2" fill="#7c3aed"/>

  <!-- label -->
  <text x="300" y="286" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#7c3aed" text-anchor="middle">Event</text>
  <text x="300" y="308" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">No image available</text>
</svg>
